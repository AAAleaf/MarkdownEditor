name: Build Windows EXE

# 触发：推送到 master/other 自动构建；也可手动触发，手动时可选择目标平台
on:
  push:
    branches: [ other ]
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform (x64 优先；若 x64 构建失败，可改为 Win32 重试)"
        required: true
        default: "x64"
        type: choice
        options:
          - x64
          - Win32

jobs:
  build:
    runs-on: windows-latest   # GitHub 托管的 Windows Server + 最新 Visual Studio（工具集跟随 DefaultPlatformToolset）
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 原工程锁定了 10.0.17134.0（runner 上不存在），这里探测实际安装的 Windows SDK 版本
      - name: Detect installed Windows SDK
        id: sdk
        shell: pwsh
        run: |
          $inc = "C:\Program Files (x86)\Windows Kits\10\Include"
          $sdk = (Get-ChildItem $inc -ErrorAction SilentlyContinue | Sort-Object Name | Select-Object -Last 1).Name
          if (-not $sdk) { $sdk = "10.0.22621.0" }
          Write-Host "Using Windows SDK: $sdk"
          "version=$sdk" >> $env:GITHUB_OUTPUT

      # 安装 MFC / ATL 组件。
      # 原工程用 MFC（静态链接），但 GitHub runner 默认没装 MFC 库，会报 MSB8041。
      # 本步骤：先探测是否已有 -> 没有才补装 -> 装完强制校验 -> 失败立即抛错并打印 installer 日志。
      - name: Ensure MFC / ATL are installed
        shell: pwsh
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath  = & $vsWhere -latest -property installationPath
          if (-not $vsPath) { throw "vswhere did not find a Visual Studio install." }
          Write-Host "VS install path: $vsPath"

          # 静态链接 MFC 需要 <最新MSVC>\atlmfc\lib\x64\mfcs140.lib
          # 注意：必须检查「最新」MSVC 目录，因为它才是 DefaultPlatformToolset 实际使用的工具集，
          # 否则可能命中旧的、不带 MFC 的 MSVC 版本而误判「已安装」。
          $msvcRoot = "$vsPath\VC\Tools\MSVC"
          function Test-MfcPresent {
            $latest = Get-ChildItem $msvcRoot -ErrorAction SilentlyContinue | Sort-Object Name | Select-Object -Last 1
            if (-not $latest) { return $null }
            $lib = Join-Path $latest.FullName "atlmfc\lib\x64\mfcs140.lib"
            if (Test-Path $lib) { return (Get-Item $lib) } else { return $null }
          }

          $existing = Test-MfcPresent
          if ($existing) {
            Write-Host "MFC already present ($($existing.FullName)); skip install."
            exit 0
          }

          Write-Host "MFC not found; installing VC.MFC + VC.ATL components..."

          $boot = Join-Path $env:RUNNER_TEMP "vs_enterprise.exe"
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vs_enterprise.exe" -OutFile $boot

          $log = Join-Path $env:RUNNER_TEMP "vs_install.log"
          $p = Start-Process -FilePath $boot -ArgumentList @(
            "modify",
            "--installPath", "`"$vsPath`"",
            "--add", "Microsoft.VisualStudio.Component.VC.MFC",
            "--add", "Microsoft.VisualStudio.Component.VC.ATL",
            "--quiet", "--wait", "--norestart",
            "--log", "`"$log`""
          ) -Wait -PassThru

          if ($p.ExitCode -ne 0) {
            Write-Host "---- VS installer log (tail) ----"
            Get-Content $log -ErrorAction SilentlyContinue | Select-Object -Last 60
            throw "VS modify failed with exit code $($p.ExitCode)."
          }

          $after = Test-MfcPresent
          if (-not $after) {
            Write-Host "---- VS installer log (tail) ----"
            Get-Content $log -ErrorAction SilentlyContinue | Select-Object -Last 60
            throw "MFC still missing after install (mfcs140.lib not found under $vsPath)."
          }
          Write-Host "MFC installed OK: $($after.FullName)"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # 关键覆盖项：
      #   工具集不再硬编码：vcxproj 已改为 $(DefaultPlatformToolset)，跟随 runner 实际安装的 VS
      #   （VS2022=v143 / VS2025=v150），从而与上面安装的「latest」MFC 组件版本天然一致，
      #   避免之前「v143 工具集 + v150 MFC」错配导致的 MSB8041。
      #   /p:WindowsTargetPlatformVersion  用上面探测到的 SDK，覆盖锁死的 10.0.17134.0
      - name: Build (${{ github.event.inputs.platform || 'x64' }})
        shell: cmd
        run: msbuild src/MarkdownEditor.sln /restore /p:Configuration=Release /p:Platform=${{ github.event.inputs.platform || 'x64' }} /p:WindowsTargetPlatformVersion=${{ steps.sdk.outputs.version }} /m

      # exe 实际落在仓库根目录的 download/（vcxproj 的 OutputFile=..\download\），
      # 故这里在整个仓库递归查找，而不是只搜 src/。
      - name: Show result
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path . -Recurse -Filter MarkdownEditor.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exe) {
            Write-Host "Built: $($exe.FullName) ($([math]::Round($exe.Length/1KB)) KB)"
          } else {
            Write-Host "## MarkdownEditor.exe not found anywhere. Candidate files:"
            Get-ChildItem -Path . -Recurse -Include *.exe,*.log -ErrorAction SilentlyContinue |
              Select-Object FullName, Length | Format-Table -AutoSize
            Write-Error "MarkdownEditor.exe not found!"
          }

      # 把 exe 与 WebView2 运行时加载器(WebView2Loader.dll) 一并收进 dist/ 再上传。
      # WebView2Loader.dll 由 Microsoft.Web.WebView2 NuGet 包在构建时自动复制到 exe 同目录。
      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $exe = Get-ChildItem -Path . -Recurse -Filter MarkdownEditor.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          $dll = Get-ChildItem -Path . -Recurse -Filter WebView2Loader.dll -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName dist/MarkdownEditor.exe }
          if ($dll) { Copy-Item $dll.FullName dist/WebView2Loader.dll }
          if (-not $exe) { Write-Error "MarkdownEditor.exe not found!" }

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: MarkdownEditor-${{ github.event.inputs.platform || 'x64' }}
          path: dist
