name: Build Windows EXE

# 触发：推送到 master/main 自动构建；也可手动触发，手动时可选择目标平台
on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform (x64 优先；若 x64 构建失败，可改为 Win32 重试)"
        required: true
        default: "x64"
        type: choice
        options:
          - x64
          - Win32

jobs:
  build:
    runs-on: windows-latest   # GitHub 托管的 Windows Server + Visual Studio 2022 (v143)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 原工程锁定了 10.0.17134.0（runner 上不存在），这里探测实际安装的 Windows SDK 版本
      - name: Detect installed Windows SDK
        id: sdk
        shell: pwsh
        run: |
          $inc = "C:\Program Files (x86)\Windows Kits\10\Include"
          $sdk = (Get-ChildItem $inc -ErrorAction SilentlyContinue | Sort-Object Name | Select-Object -Last 1).Name
          if (-not $sdk) { $sdk = "10.0.22621.0" }
          Write-Host "Using Windows SDK: $sdk"
          "version=$sdk" >> $env:GITHUB_OUTPUT

      # 安装 MFC / ATL 组件。
      # 原工程用 MFC（静态链接），但 GitHub runner 默认没装 MFC 库，会报 MSB8041。
      # 本步骤：先探测是否已有 -> 没有才补装 -> 装完强制校验 -> 失败立即抛错并打印 installer 日志。
      - name: Ensure MFC / ATL are installed
        shell: pwsh
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath  = & $vsWhere -latest -property installationPath
          if (-not $vsPath) { throw "vswhere did not find a Visual Studio install." }
          Write-Host "VS install path: $vsPath"

          # 静态链接 MFC 需要 atlmfc\lib\<arch>\mfcs140.lib
          function Test-MfcPresent {
            return (Get-ChildItem -Path "$vsPath\VC\Tools\MSVC\*\atlmfc\lib\x64\mfcs140.lib" -ErrorAction SilentlyContinue |
                    Select-Object -First 1)
          }

          $existing = Test-MfcPresent
          if ($existing) {
            Write-Host "MFC already present ($($existing.FullName)); skip install."
            exit 0
          }

          Write-Host "MFC not found; installing VC.MFC + VC.ATL components..."

          $boot = Join-Path $env:RUNNER_TEMP "vs_enterprise.exe"
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vs_enterprise.exe" -OutFile $boot

          $log = Join-Path $env:RUNNER_TEMP "vs_install.log"
          $p = Start-Process -FilePath $boot -ArgumentList @(
            "modify",
            "--installPath", "`"$vsPath`"",
            "--add", "Microsoft.VisualStudio.Component.VC.MFC",
            "--add", "Microsoft.VisualStudio.Component.VC.ATL",
            "--quiet", "--wait", "--norestart",
            "--log", "`"$log`""
          ) -Wait -PassThru

          if ($p.ExitCode -ne 0) {
            Write-Host "---- VS installer log (tail) ----"
            Get-Content $log -ErrorAction SilentlyContinue | Select-Object -Last 60
            throw "VS modify failed with exit code $($p.ExitCode)."
          }

          $after = Test-MfcPresent
          if (-not $after) {
            Write-Host "---- VS installer log (tail) ----"
            Get-Content $log -ErrorAction SilentlyContinue | Select-Object -Last 60
            throw "MFC still missing after install (mfcs140.lib not found under $vsPath)."
          }
          Write-Host "MFC installed OK: $($after.FullName)"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # 关键覆盖项：
      #   /p:PlatformToolset=v143       原工程是 v141（VS2017），runner 上已无法安装，改用 v143
      #   /p:WindowsTargetPlatformVersion  用上面探测到的 SDK，覆盖锁死的 10.0.17134.0
      - name: Build (${{ github.event.inputs.platform || 'x64' }})
        run: msbuild src/MarkdownEditor.sln /p:Configuration=Release /p:Platform=${{ github.event.inputs.platform || 'x64' }} /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=${{ steps.sdk.outputs.version }} /m

      - name: Show result
        shell: pwsh
        run: |
          $exe = Get-ChildItem src -Recurse -Filter MarkdownEditor.exe | Select-Object -First 1
          if ($exe) { Write-Host "Built: $($exe.FullName) ($([math]::Round($exe.Length/1KB)) KB)" } else { Write-Error "MarkdownEditor.exe not found!" }

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: MarkdownEditor-${{ github.event.inputs.platform || 'x64' }}
          path: src/**/MarkdownEditor.exe
